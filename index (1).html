<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Enterprise Secure Chat</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">


    <!-- CryptoJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <!-- JS -->
   <script src="{{ url_for('static', filename='script.js') }}" defer></script>

</head>
<body>

<h1 class="title">Enterprise Secure Chat (Role-Based)</h1>

<div class="terminal-container">

    <!-- SENDER TERMINAL -->
    <div class="terminal sender">
        <h2>Sender</h2>

        <input id="sender-msg" placeholder="Enter message">
        <input id="sender-key" placeholder="Secret key">
        <input id="sender-expiry" type="number" placeholder="Expiry (seconds)">

        <p class="label">Send To Roles:</p>
        <div class="roles">
            <label><input type="checkbox" value="Admin" class="send-role"> Admin</label>
            <label><input type="checkbox" value="Employee" class="send-role"> Employee</label>
            <label><input type="checkbox" value="Guest" class="send-role"> Guest</label>
        </div>

        <button onclick="sendMessage()">Send</button>

        <div class="output" id="sender-output"></div>
    </div>

    <!-- RECEIVER TERMINAL -->
    <div class="terminal receiver">
        <h2>Receiver</h2>

        <p class="label">Select Your Role:</p>
        <select id="receiver-role">
            <option value="">-- Select Role --</option>
            <option value="Admin">Admin</option>
            <option value="Employee">Employee</option>
            <option value="Guest">Guest</option>
        </select>

        <input id="receiver-key" placeholder="Enter secret key">
        <button onclick="receiveMessage()">Receive</button>

        <div class="output" id="receiver-output"></div>
    </div>

    <!-- EAVESDROPPER TERMINAL -->
    <div class="terminal eavesdropper">
        <h2>Eavesdropper</h2>

        <p class="label">Unauthorized Intercept</p>
        <button onclick="eavesdropperView()">Intercept</button>

        <div class="output" id="eavesdropper-output"></div>
    </div>

</div>

</body>
</html>
